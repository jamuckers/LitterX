<!doctype html>

<html>
<head>
<title>My first Webpage</title>
<meta charset="utf-8" />
<meta http-equiv="Content-type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<meta name="keywords" content="HTML">

<link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>

<link rel="stylesheet" href="styles.css"> 




</head>
<body>
<div id="checkout-modal" class="modal">
	<div class="modal-content">
		<span class="close-btn">&times;</span>
		<h2 id="pop-title">Checkout</h2>
		<p>Total to pay: <strong>&euro;<span id="final-total">0.00</span></strong></p>

		<label for="email">Email Address:</label>
		<input type="email" id="checkout-email" placeholder="your@email.com"required>

		<label for="CCName">Credit Card Name:</label>
		<input type="CCName" id="checkout-CCName" placeholder="Credit Card Name"required>

		<label for="CCNum">Credit Card Number:</label>
		<input type="CCNum" id="checkout-CCNum" placeholder="Credit Card Number"required>

		<label for="CVC">CVC:</label>
		<input type="CVC" id="checkout-CVC" placeholder="CVC" required>

		<button id="confirm-pay">Confirm Payment</button>
		</div>
	</div>
<div id="gif-modal" class="modal" style="display:none;">
    <div class="modal-content" style="text-align: center;">
        <h3>See you on the darkweb!</h3>
        <img src="products/hacker.gif" 
             alt="Success" style="width:100%; max-width:300px; margin: 20px 0;">
        <p>Thank you for your personal data >: )</p>
    </div>
</div>


<header style="background: #333; color:white; padding: 20px; display: flex; justify-content: space-between; align-items:center;">
	<h2 id="store-title">Loading store...</h2>
<button id="open-checkout"  style="padding:10px 20px; background:green; color:white; border-radius:50px; cursor:pointer;">
	Go to Checkout ($ <span id="cart-total-nav"> 0.00 </span> )
</button>
</header>


	<div class="products"></div>

	<script src="product-script.js" defer ></script>


<p>This is my first webpage!</p>
</body>
</html>
